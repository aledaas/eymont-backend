services:

    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - ./:/var/www
        depends_on:
            - mysql
            - redis

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        command: php artisan queue:work
        volumes:
            - ./:/var/www
        depends_on:
            - php

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
        volumes:
            - ./:/var/www

    mysql:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: eymont
            MYSQL_ROOT_PASSWORD: secret
        ports:
            - "3306:3306"

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"

    mailpit:
        image: axllent/mailpit
        ports:
            - "8025:8025"
    mongo:
        image: mongo:7
        container_name: eymont_mongo
        ports:
            - "27017:27017"
        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: secret
        volumes:
            - mongo_data:/data/db
    volumes:
        mysql_data:
        mongo_data:
