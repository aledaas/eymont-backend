services:

    nginx:
        image: nginx:alpine
        container_name: eymont-nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: eymont-php
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql
            - mongo
            - redis

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: eymont-queue
        command: php artisan queue:work
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql
            - mongo
            - redis

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: eymont-scheduler
        command: >
            sh -c "while true;
            do php artisan schedule:run;
            sleep 60;
            done"
        volumes:
            - .:/var/www/html
        depends_on:
            - mysql
            - mongo
            - redis

    mysql:
        image: mysql:8.4
        container_name: eymont-mysql
        restart: unless-stopped
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: eymont
            MYSQL_ROOT_PASSWORD: secret
            MYSQL_USER: eymont
            MYSQL_PASSWORD: secret
        volumes:
            - mysql_data:/var/lib/mysql

    mongo:
        image: mongo:8
        container_name: eymont-mongo
        restart: unless-stopped
        ports:
            - "27017:27017"
        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: secret
        volumes:
            - mongo_data:/data/db

    redis:
        image: redis:7-alpine
        container_name: eymont-redis
        ports:
            - "6379:6379"

    mailpit:
        image: axllent/mailpit
        container_name: eymont-mailpit
        ports:
            - "8025:8025"
            - "1025:1025"

volumes:
    mysql_data:
    mongo_data:
